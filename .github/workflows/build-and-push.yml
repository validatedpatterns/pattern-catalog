name: Build (amd64 and arm64) and push pattern catalog to Quay

on:
  push:
    branches: ["main", "stable-v1"]
    paths:
      - "catalog/**"
      - "templates/**"
      - ".github/workflows/build-and-push.yml"

  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: localhost
  NAME: pattern-ui-catalog
  TAG: ${{ github.ref_name == 'main' && 'latest' || github.ref_name }}

jobs:
  validate-yaml:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Validate catalog YAML files
        run: |
          pip install yamllint
          yamllint -s catalog/

  build-container:
    needs: [validate-yaml]
    strategy:
      matrix:
        include:
          - targetarch: amd64
            runner: ubuntu-latest
          - targetarch: arm64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Generate Dockerfile and build container
        env:
          CONTAINER: ${{ env.NAME }}:${{ env.TAG }}
          TARGETARCH: ${{ matrix.targetarch }}
        run: |
          make generate-dockerfile
          buildah build --platform "linux/${TARGETARCH}" -f pattern-ui-catalog.Dockerfile -t "${CONTAINER}-${TARGETARCH}" .
          buildah push "${CONTAINER}-${TARGETARCH}" "docker-archive:/tmp/image-${TARGETARCH}.tar:${CONTAINER}-${TARGETARCH}"

      - name: Upload image artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: image-${{ matrix.targetarch }}-${{ github.run_id }}
          path: /tmp/image-${{ matrix.targetarch }}.tar
          retention-days: 1

  push-multiarch-manifest:
    needs: [build-container]
    if: github.repository == 'validatedpatterns/pattern-ui-catalog'
    runs-on: ubuntu-latest
    environment: quay
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download AMD64 image
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: image-amd64-${{ github.run_id }}
          path: /tmp

      - name: Download ARM64 image
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: image-arm64-${{ github.run_id }}
          path: /tmp

      - name: Load tarballs into local containers-storage
        run: |
          buildah pull docker-archive:/tmp/image-amd64.tar
          buildah pull docker-archive:/tmp/image-arm64.tar

      - name: Log into Quay
        env:
          USERNAME: ${{ secrets.QUAY_USERNAME }}
          PASSWORD: ${{ secrets.QUAY_PASSWORD }}
        run: |
          buildah login -u "${USERNAME}" -p "${PASSWORD}" quay.io

      - name: Create manifest and push to Quay
        id: manifest-push
        env:
          UPLOADREGISTRY: quay.io/validatedpatterns
          CONTAINER: ${{ env.NAME }}:${{ env.TAG }}
        run: |
          buildah manifest create "${REGISTRY}/${CONTAINER}"
          buildah manifest add --arch=amd64 "${REGISTRY}/${CONTAINER}" "${REGISTRY}/${CONTAINER}-amd64"
          buildah manifest add --arch=arm64 "${REGISTRY}/${CONTAINER}" "${REGISTRY}/${CONTAINER}-arm64"
          buildah manifest push --all "${REGISTRY}/${CONTAINER}" "docker://${UPLOADREGISTRY}/${CONTAINER}"
          DIGEST=$(skopeo inspect --format "{{.Digest}}" "docker://${UPLOADREGISTRY}/${CONTAINER}")
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0
        with:
          cosign-release: "v2.2.4"

      - name: Sign the published image
        env:
          CONTAINER: ${{ env.NAME }}:${{ env.TAG }}
          DIGEST: ${{ steps.manifest-push.outputs.digest }}
          UPLOADREGISTRY: quay.io/validatedpatterns
        run: |
          cat "${XDG_RUNTIME_DIR}/containers/auth.json" > ~/.docker/config.json
          cosign sign --yes "${UPLOADREGISTRY}/${CONTAINER}@${DIGEST}"
